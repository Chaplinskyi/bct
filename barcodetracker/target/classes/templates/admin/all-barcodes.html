<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">

<head>
    <meta charset="UTF-8">
    <title>База Даних</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}"><!-- Підключення власного CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<style>
    .page-link.green {
        background-color: #198754;
        color: white;
        border-color: #198754;
    }
    .page-link.green:hover {
        background-color: #157347;
        color: white;
        border-color: #146c43;
    }
</style>

<body class="bg-light">
<div class="container py-4">

    <div class="logo-title-container mb-4">
        <img src="/images/logo.png" alt="Логотип">
        <h1 class="text-primary m-0">BCT - База Даних</h1>
    </div>

    <form th:action="@{/barcodes}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="apn" class="form-control" placeholder="Фільтр по APN..." th:value="${apn}">
            <button type="submit" class="btn btn-primary ms-2">🔍 Пошук</button>
            <a class="btn btn-success ms-2"
               th:href="@{/barcodes/download(apn=${apn})}"
               th:classappend="${#lists.isEmpty(barcodes)} ? 'disabled' : ''"
               th:attr="aria-disabled=${#lists.isEmpty(barcodes)}, tabindex=${#lists.isEmpty(barcodes) ? '-1' : '0'}">Скачати результат</a>
        </div>
    </form>

    <div class="text-center mt-4">
        <a th:href="@{/dashboard}" class="btn btn-primary ms-2">Вернутись на головну сторінку</a>
        <a th:href="@{/barcodes/download}"
           class="btn btn-success ms-2"
           th:classappend="${#lists.isEmpty(barcodes)} ? 'disabled' : ''"
           th:attr="aria-disabled=${#lists.isEmpty(barcodes)}, tabindex=${#lists.isEmpty(barcodes) ? '-1' : '0'}">Скачати базу</a>
    </div>
    <br>

    <div class="table-responsive">
        <table class="text-center table table-bordered table-striped">
            <thead class="table-success">
            <tr>
                <th>№</th>
                <th>Bar Code</th>
                <th>APN</th>
                <th>Кількість</th>
                <th>Локація</th>
                <th>Статус</th>
                <th>Дата</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="barcode, iterStat : ${barcodes}">
                <td th:text="${iterStat.count}">1</td>
                <td>
                    <span th:text="${barcode.code}">123456</span>
                    <a th:href="@{'/barcodes/' + ${barcode.id}}" class="ms-2 text-decoration-none text-primary" title="Деталі">
                        <i class="bi bi-info-circle"></i>
                    </a>
                </td>
                <td th:text="${barcode.apn}">M3130001</td>
                <td th:text="${barcode.quantity}">18000</td>
                <td th:text="${barcode.location}">excess sk 4</td>
                <td th:text="${barcode.status}">Stock</td>
                <td th:text="${#temporals.format(barcode.lastUpdated, 'dd.MM.yyyy')}">09-06-2025</td>
            </tr>
            <tr th:if="${#lists.isEmpty(barcodes)}">
                <td colspan="7" class="text-center text-muted">Немає штрих кодів у базі</td>
            </tr>
            </tbody>
        </table>
        <nav th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <!-- Перша сторінка -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link green" th:href="@{/barcodes(page=0, apn=${apn})}">Перша</a>
                </li>

                <!-- Попередня сторінка -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link green" th:href="@{/barcodes(page=${currentPage - 1}, apn=${apn})}">← Попередня</a>
                </li>

                <!-- Номер сторінки -->
                <li class="page-item disabled">
                    <span class="page-link">Сторінка <span th:text="${currentPage + 1}"></span> з <span th:text="${totalPages}"></span></span>
                </li>

                <!-- Наступна сторінка -->
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                    <a class="page-link green" th:href="@{/barcodes(page=${currentPage + 1}, apn=${apn})}">Наступна →</a>
                </li>

                <!-- Остання сторінка -->
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                    <a class="page-link green" th:href="@{/barcodes(page=${totalPages - 1}, apn=${apn})}">Остання</a>
                </li>
            </ul>
        </nav>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
