<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"> <!-- Підключення власного CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="bg-light">
<div class="container py-4">

    <div class="logo-title-container mb-4">
        <img src="/images/logo.png" alt="Логотип" width="100" height="100">
        <h1 class="text-primary m-0">BCT - Admin Dashboard</h1>
    </div>

    <!-- Barcode Search -->

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}">Штрих код не знайдено!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/barcodes/search}" method="get" class="d-flex" role="search">
        <div class="input-group">
            <input name="code" class="form-control" type="search" placeholder="Шукати штрих код..." aria-label="Search" required>
            <button type="submit" class="btn btn-primary ms-2">🔍 Пошук</button>
        </div>
    </form><br>

    <!-- Database Button -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            База Даних
        </div>
        <div class="card-body">
            <div class="d-flex flex-wrap justify-content-center gap-2">
                <a th:href="@{/barcodes}" class="btn btn-primary ms-2">Переглянути Базу Даних</a>
                <a th:href="@{/upload}" class="btn btn-primary ms-2">Добавити штрих коди</a>
                <a th:href="@{/transfer}" class="btn btn-primary ms-2">Перенести на локацію</a>
                <a th:href="@{/upload-discarded}" class="btn btn-primary ms-2">Списати штрих коди</a>
                <a th:href="@{/discarded}" class="btn btn-primary ms-2">Облік списаних штрих кодів</a>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
