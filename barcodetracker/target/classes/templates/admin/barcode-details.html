<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Деталі штрих коду</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"> <!-- Підключення власного CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="bg-light">
<div class="container py-4">

    <div class="logo-title-container mb-4">
        <img src="/images/logo.png" alt="Логотип">
        <h1 class="text-primary m-0">BCT - Інформація про Bar Code</h1>
    </div>

    <table class="table table-bordered mt-4 text-start align-middle">
        <tr>
            <th class="py-3">Штрих код</th>
            <td class="py-3" th:text="${barcode.code}">123456</td>
        </tr>
        <tr>
            <th class="py-3">APN</th>
            <td class="py-3" th:text="${barcode.apn}">APN</td>
        </tr>
        <tr>
            <th class="py-3">Кількість</th>
            <td class="py-3" th:text="${barcode.quantity}">1</td>
        </tr>
        <tr>
            <th class="py-3">Локація</th>
            <td class="py-3">
                <form th:action="@{'/barcodes/' + ${barcode.id} + '/updateLocation'}" method="post"
                      class="d-flex align-items-center flex-wrap gap-2" onsubmit="enableIfDisabled()">

                    <!-- Основна локація -->
                    <select id="locationSelect" name="newLocation" class="form-select w-auto">
                        <option value="prestock"
                                th:selected="${barcode.location?.startsWith('prestock')}">prestock</option>
                        <option value="excess sk"
                                th:selected="${barcode.location?.startsWith('excess sk')}">excess sk</option>
                        <option value="excess st"
                                th:selected="${barcode.location?.startsWith('excess st')}">excess st</option>
                        <option value="excess sv"
                                th:selected="${barcode.location?.startsWith('excess sv')}">excess sv</option>
                        <option value="excess sr"
                                th:selected="${barcode.location?.startsWith('excess sr')}">excess sr</option>
                        <option value="excess d"
                                th:selected="${barcode.location?.startsWith('excess d')}">excess d</option>
                        <option value="excess bulky"
                                th:selected="${barcode.location?.startsWith('excess bulky')}">excess bulky</option>
                        <option value="excess sk"
                                th:selected="${barcode.location?.startsWith('excess sk')}">excess sk</option>
                    </select>

                    <!-- Номер локації -->
                    <div class="d-flex align-items-center">
                        <label for="locationNumber" class="me-2 mb-0">№</label>
                        <select class="form-select w-auto" name="locationNumber" id="locationNumber" required>
                            <option value="">—</option>
                            <option th:each="i : ${#numbers.sequence(1,15)}"
                                    th:value="${i}"
                                    th:text="${i}"
                                    th:selected="${barcode.location?.endsWith(' ' + i)}">
                            </option>
                        </select>
                    </div>

                    <!-- Кнопка -->
                    <button id="moveLocationBtn" type="submit" class="btn btn-success">Move</button>
                </form>
            </td>
        </tr>
        <tr>
            <th class="py-3">Статус</th>
            <td class="py-3">
                <form th:action="@{'/barcodes/' + ${barcode.id} + '/updateStatus'}" method="post" class="d-flex align-items-center gap-2">
                    <select id="statusSelect" name="newStatus" class="form-select w-auto">
                        <option value="stock" th:selected="${barcode.status == 'stock'}">stock</option>
                        <option value="out" th:selected="${barcode.status == 'out'}">out</option>
                        <option value="check" th:selected="${barcode.status == 'check'}">check</option>
                    </select>
                    <button id="moveStatusBtn" type="submit" class="btn btn-success">Move</button>
                </form>
            </td>
        </tr>
        <tr>
            <th class="py-3">Дата додавання в систему</th>
            <td class="py-3" th:text="${#temporals.format(barcode.lastUpdated, 'dd.MM.yyyy HH:mm')}">2025-06-10</td>
        </tr>
    </table>


    <div class="row mt-5">
        <div class="col-md-6">
            <h4>🧭 Історія локацій</h4>
            <ul class="list-group">
                <li th:each="loc : ${locationHistory}" class="list-group-item">
                    <b th:text="${loc.newLocation}">Локація</b> —
                    <span th:text="${#temporals.format(loc.changeTime, 'dd.MM.yyyy HH:mm')}">Дата</span>
                </li>
            </ul>
        </div>

        <div class="col-md-6">
            <h4>🔁 Історія статусів</h4>
            <ul class="list-group">
                <li th:each="stat : ${statusHistory}" class="list-group-item">
                    <b th:text="${stat.newStatus}">Статус</b> —
                    <span th:text="${#temporals.format(stat.changeTime, 'dd.MM.yyyy HH:mm')}">Дата</span>
                </li>

            </ul>
        </div>
    </div>

    <div class="text-center mt-4">
        <a th:href="@{/barcodes}" class="btn btn-primary ms-2">Вернутись до Бази Даних</a>
        <a th:href="@{/dashboard}" class="btn btn-primary ms-2">Вернутись на головну сторінку</a>
    </div>
</div>

<script>
    // Перевірка для локації
    const currentLocation = document.querySelector("#locationSelect").value;
    const locationSelect = document.querySelector("#locationSelect");
    const moveLocationBtn = document.querySelector("#moveLocationBtn");

    function checkLocationChange() {
        moveLocationBtn.disabled = locationSelect.value === currentLocation;
    }

    locationSelect.addEventListener("change", checkLocationChange);
    checkLocationChange(); // одразу перевірити

    // Перевірка для статусу
    const currentStatus = document.querySelector("#statusSelect").value;
    const statusSelect = document.querySelector("#statusSelect");
    const moveStatusBtn = document.querySelector("#moveStatusBtn");

    function checkStatusChange() {
        moveStatusBtn.disabled = statusSelect.value === currentStatus;
    }

    statusSelect.addEventListener("change", checkStatusChange);
    checkStatusChange(); // одразу перевірити
</script>
<script>
    function toggleLocationNumber() {
        const locSelect = document.getElementById("locationSelect");
        const numSelect = document.getElementById("locationNumber");

        if (locSelect.value === "prestock") {
            numSelect.disabled = true;
            numSelect.value = ""; // Обнуляємо значення, щоб не зберігалось
        } else {
            numSelect.disabled = false;
        }
    }

    function enableIfDisabled() {
        const numSelect = document.getElementById("locationNumber");
        if (numSelect.disabled) {
            numSelect.disabled = false;
        }
    }

    document.addEventListener("DOMContentLoaded", toggleLocationNumber);
    document.getElementById("locationSelect").addEventListener("change", toggleLocationNumber);
</script>
</body>
</html>
