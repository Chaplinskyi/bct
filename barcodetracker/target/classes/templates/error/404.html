<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Штрихкод не знайдено</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-container {
            margin-top: 10%;
        }
        .error-icon {
            font-size: 5rem;
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="container text-center error-container">
    <div class="error-icon">🚫</div>
    <h1 class="display-4 text-danger mt-3">404 — Не знайдено</h1>
    <p class="lead text-muted" th:text="${errorMessage}">Помилка запиту.</p>
    <a href="/dashboard" class="btn btn-outline-primary mt-4">⬅ На головну</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
