<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Зміна локації</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"> <!-- Підключення власного CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="bg-light">
<div class="container py-5">

    <div class="logo-title-container mb-4">
        <img src="/images/logo.png" alt="Логотип" width="100" height="100">
        <h1 class="text-primary m-0">BCT - Зміна локації штрих кодів</h1>
    </div>

    <!-- Alerts -->
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Upload Excel Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            Завантаження (Excel)
        </div>
        <div class="card-body">
            <form th:action="@{/transfer}" method="post" enctype="multipart/form-data"
                  class="row g-3 align-items-end">

                <div class="col-md-4">
                    <label for="file" class="form-label">Виберіть Excel-файл</label>
                    <input type="file" class="form-control" id="file" name="file" accept=".xlsx" required>
                </div>

                <div class="col-md-4">
                    <label for="newLocation" class="form-label">Нова локація</label>
                    <select id="newLocation" name="newLocation" class="form-select" required>
                        <option value="prestock">prestock</option>
                        <option value="excess sk">excess sk</option>
                        <option value="excess st">excess st</option>
                        <option value="excess sv">excess sv</option>
                        <option value="excess sr">excess sr</option>
                        <option value="excess d">excess d</option>
                        <option value="excess bulky">excess bulky</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="locationNumber" class="form-label">№</label>
                    <select id="locationNumber" name="locationNumber" class="form-select" required>
                        <option th:each="i : ${#numbers.sequence(1,15)}" th:value="${i}" th:text="${i}"></option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Перенести</button>
                </div>
            </form>
        </div>
    </div>

    <div class="text-center mt-3">
        <a th:href="@{/dashboard}" class="btn btn-primary ms-2">Вернутись на головну сторінку</a>
    </div>

</div>
</body>
</html>
