<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завантаження списаних</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"> <!-- Підключення власного CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="bg-light">
<div class="container py-5">

    <div class="logo-title-container mb-4">
        <img src="/images/logo.png" alt="Логотип" width="100" height="100">
        <h1 class="text-primary m-0">BCT - Завантажити файл з штрих кодами (Excel)</h1>
    </div>

    <!-- Alerts -->
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Upload Excel Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            Завантаження (Excel)
        </div>
        <div class="card-body">
            <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="file" class="form-label">Оберіть Excel-файл (.xlsx):</label>
                    <input class="form-control" type="file" name="file" id="file" accept=".xlsx" required>
                </div>
                <button type="submit" class="btn btn-primary ms-2">Завантажити</button>
            </form>
        </div>
    </div>

    <div class="text-center mt-3">
        <a th:href="@{/dashboard}" class="btn btn-primary ms-2">Вернутись на головну сторінку</a>
    </div>

</div>
</body>
</html>
