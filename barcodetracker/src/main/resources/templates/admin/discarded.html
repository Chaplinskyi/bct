<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Списані штрих-коди</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css"> <!-- Підключення власного CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<style>
    .page-link.green {
        background-color: #198754;
        color: white;
        border-color: #198754;
    }
    .page-link.green:hover {
        background-color: #157347;
        color: white;
        border-color: #146c43;
    }
</style>

<body class="bg-light">
<div class="container py-4">

    <div class="logo-title-container mb-4">
        <img src="/images/logo.png" alt="Логотип" width="100" height="100">
        <h1 class="text-primary m-0">BCT - Списані штрих-коди (Out)</h1>
    </div>

    <!-- Форма фільтрації по даті , APN -->
    <div class="card-body">
        <div class="mt-3">

            <!-- Фільтр по даті -->
            <form th:action="@{/discarded}" method="get" class="d-flex align-items-center gap-2 mb-3 flex-wrap">
                <label for="filterDateOnly" class="form-label mb-0">Фільтрувати по даті:</label>
                <input type="date" id="filterDateOnly" class="form-control w-auto" name="date"
                       th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                <button type="submit" class="btn btn-success">🔍 Пошук</button>
            </form>

            <!-- Фільтр по APN -->
            <form method="get" th:action="@{/discarded}" class="d-flex align-items-center gap-2 flex-wrap">
                <label for="apnInput" class="form-label mb-0">Фільтрувати по APN:</label>
                <input type="date" class="form-control w-auto"
                       name="date"
                       th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">

                <input type="text" class="form-control w-auto"
                       id="apnInput" name="apn"
                       placeholder="Введіть APN..." th:value="${param.apn}"/>

                <button type="submit" class="btn btn-success">🔍 Пошук</button>
            </form>

        </div>
    </div>

    <div class="text-center mt-3">
        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <a th:href="@{/dashboard}" class="btn btn-primary">Вернутись на головну сторінку</a>
            <a class="btn btn-success"
               th:href="@{/discarded/export(apn=${apn}, date=${#dates.format(date, 'yyyy-MM-dd')})}"
               th:classappend="${#lists.isEmpty(discardedBarcodes)} ? 'disabled' : ''"
               th:attr="aria-disabled=${#lists.isEmpty(discardedBarcodes)}, tabindex=${#lists.isEmpty(discardedBarcodes) ? '-1' : '0'}">
                Скачати (Excel)
            </a>
        </div>
    </div><br>

    <!-- Таблиця штрих-кодів -->
    <table class="text-center table table-bordered table-striped">
        <thead class="table-success">
        <tr>
            <th>Штрих код</th>
            <th>APN</th>
            <th>Кількість</th>
            <th>Локація</th>
            <th>Статус</th>
            <th>Дата зміни</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="barcode : ${discardedBarcodes}">
            <td>
                <span th:text="${barcode.code}">123456</span>
                <a th:href="@{'/barcodes/' + ${barcode.id}}" class="ms-2 text-decoration-none text-primary" title="Деталі">
                    <i class="bi bi-info-circle"></i>
                </a>
            </td>
            <td th:text="${barcode.apn}">APN</td>
            <td th:text="${barcode.quantity}">1</td>
            <td th:text="${barcode.location}">excess sk</td>
            <td th:text="${barcode.status}">out</td>
            <td th:text="${#temporals.format(barcode.lastUpdated, 'yyyy-MM-dd HH:mm')}">2025-06-10</td>
        </tr>
        <tr th:if="${#lists.isEmpty(discardedBarcodes)}">
            <td colspan="7" class="text-center text-muted">Немає списаних штрих кодів</td>
        </tr>
        </tbody>
    </table>
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/discarded(page=0, apn=${apn}, date=${date})}">Перша</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/discarded(page=${currentPage - 1}, apn=${apn}, date=${date})}">← Попередня</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link">Сторінка <span th:text="${currentPage + 1}"></span> з <span th:text="${totalPages}"></span></span>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/discarded(page=${currentPage + 1}, apn=${apn}, date=${date})}">Наступна →</a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/discarded(page=${totalPages - 1}, apn=${apn}, date=${date})}">Остання</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
